<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="SRV GÁS® — Conciliação Compras × Caixa · Uso interno">
<title>SRV GÁS® — Conciliação Compras × Caixa</title>
<!-- ── Acesso restrito (senha) ───────────────────────────────────────────── -->
<style id="srv-auth-style">body{visibility:hidden}html.srv-auth-ok body{visibility:visible}
#srv-auth{position:fixed;inset:0;z-index:2147483647;background:#0D1B3E;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',Arial,sans-serif}
#srv-auth .box{background:#fff;padding:32px 28px;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center;width:280px}
#srv-auth h2{margin:0 0 4px;color:#393E9C;font-size:20px;font-weight:700}
#srv-auth p{margin:0 0 18px;color:#6B7BAE;font-size:13px}
#srv-auth input{width:100%;padding:11px 12px;border:2px solid #D6E0F0;border-radius:8px;font-size:18px;text-align:center;letter-spacing:4px;box-sizing:border-box;outline:none}
#srv-auth input:focus{border-color:#393E9C}
#srv-auth button{width:100%;margin-top:12px;padding:11px;border:0;border-radius:8px;background:#393E9C;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
#srv-auth .err{color:#C0392B;font-size:12px;height:14px;margin-top:8px}</style>
<script>
(function(){
  var SENHA='1234', KEY='srv_auth_concil';
  function libera(){document.documentElement.classList.add('srv-auth-ok');var o=document.getElementById('srv-auth');if(o)o.remove();}
  if(sessionStorage.getItem(KEY)==='ok'){document.addEventListener('DOMContentLoaded',libera);return;}
  document.addEventListener('DOMContentLoaded',function(){
    var ov=document.createElement('div');ov.id='srv-auth';
    ov.innerHTML='<div class="box"><h2>SRV GÁS®</h2><p>Acesso restrito</p><input id="srv-auth-in" type="password" inputmode="numeric" autocomplete="off" placeholder="••••"><div class="err" id="srv-auth-err"></div><button id="srv-auth-btn">Entrar</button></div>';
    document.documentElement.appendChild(ov);
    var inp=document.getElementById('srv-auth-in');inp.focus();
    function tenta(){if(inp.value===SENHA){sessionStorage.setItem(KEY,'ok');libera();}else{document.getElementById('srv-auth-err').textContent='Senha incorreta';inp.value='';inp.focus();}}
    document.getElementById('srv-auth-btn').addEventListener('click',tenta);
    inp.addEventListener('keydown',function(e){if(e.key==='Enter')tenta();});
  });
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- ECOSSISTEMA SRV — cruza estoque (a comprar) × contas a pagar (Bling) -->
<script src="../base_estoque.js"></script>
<script src="../base_caixa.js"></script>
<style>
:root {
  --primary:#393E9C; --primary-dark:#2a2f7a; --primary-light:#4a51c4;
  --secondary:#69BAEF; --secondary-light:#a8d8f5;
  --ink:#0D1B3E; --bg:#F0F4FA; --card:#FFFFFF; --border:#D6E0F0; --muted:#6B7BAE;
  --green:#0E7C4A; --green-bg:#E6F5EE;
  --yellow:#B07800; --yellow-bg:#FFF8E0;
  --red:#C0392B; --red-bg:#FDECEA;
  --gray:#8A96B0; --gray-bg:#F0F2F8;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

/* ── HEADER ── */
.header{background:var(--primary);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(57,62,156,.4);}
.logo{display:flex;flex-direction:column;}
.logo-text{color:#fff;font-size:18px;font-weight:700;letter-spacing:.06em;}
.logo-text sup{color:var(--secondary);font-size:11px;}
.logo-slogan{color:var(--secondary-light);font-size:9px;letter-spacing:.18em;text-transform:uppercase;margin-top:1px;}
.header-nav{display:flex;gap:2px;margin-left:auto;margin-right:18px;}
.h-tab{padding:6px 14px;color:rgba(255,255,255,.6);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;text-decoration:none;}
.h-tab:hover{color:rgba(255,255,255,.9);}
.h-tab.active{color:#fff;border-bottom-color:var(--secondary);}
.header-date{color:var(--secondary-light);font-size:10px;font-family:'DM Mono',monospace;}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 55%,var(--primary-light) 100%);padding:34px 28px 30px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 78% 50%,rgba(105,186,239,.22) 0%,transparent 60%);}
.hero-inner{max-width:1140px;margin:0 auto;position:relative;}
.hero-tag{display:inline-block;background:rgba(105,186,239,.2);border:1px solid rgba(105,186,239,.35);color:var(--secondary);font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:3px 12px;border-radius:20px;margin-bottom:10px;}
.hero-title{color:#fff;font-size:26px;font-weight:700;line-height:1.2;letter-spacing:.02em;}
.hero-title em{color:var(--secondary);font-style:normal;}
.hero-sub{color:rgba(255,255,255,.65);font-size:12px;font-weight:500;margin-top:7px;font-family:'DM Mono',monospace;}
.hero-kpis{display:flex;gap:14px;margin-top:18px;flex-wrap:wrap;}
.kpi{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:11px 16px;min-width:120px;}
.kpi-val{font-size:24px;font-weight:700;color:#fff;line-height:1;font-family:'DM Mono',monospace;}
.kpi-val.red{color:#ff9090;} .kpi-val.yellow{color:#ffd970;} .kpi-val.blue{color:var(--secondary);}
.kpi-label{font-size:9px;color:rgba(255,255,255,.55);letter-spacing:.14em;text-transform:uppercase;margin-top:5px;}

/* ── CONTEÚDO ── */
.wrap{max-width:1140px;margin:0 auto;padding:22px 28px 56px;}
.sec-title{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);margin:26px 0 12px;display:flex;align-items:center;gap:8px;}
.sec-title:first-child{margin-top:6px;}

/* meses de caixa — cards com barra no topo */
.months{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
.mcard{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:14px;position:relative;overflow:hidden;}
.mcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.mcard.lv-green::before{background:var(--green);} .mcard.lv-yellow::before{background:var(--yellow);} .mcard.lv-red::before{background:var(--red);}
.mcard .mn{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.mcard .mv{font-size:22px;font-weight:700;line-height:1.1;margin-top:5px;font-family:'DM Mono',monospace;}
.mcard.lv-green .mv{color:var(--green);} .mcard.lv-yellow .mv{color:var(--yellow);} .mcard.lv-red .mv{color:var(--red);}
.mcard .ms{font-size:10px;color:var(--gray);font-family:'DM Mono',monospace;margin-top:3px;}

/* grupo de urgência */
.grp-head{display:flex;align-items:center;gap:10px;margin:20px 0 8px;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.badge.red{background:var(--red-bg);color:var(--red);} .badge.yellow{background:var(--yellow-bg);color:var(--yellow);} .badge.green{background:var(--green-bg);color:var(--green);}
.grp-meta{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}

/* tabela estilo SRV */
table{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;overflow:hidden;}
th{background:#F7F9FE;color:var(--muted);text-align:left;padding:8px 12px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--border);}
td{padding:7px 12px;border-bottom:1px solid #F0F4FA;font-weight:500;}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:#F7F9FE;}
td.r,th.r{text-align:right;} td.c,th.c{text-align:center;}
.mono{font-family:'DM Mono',monospace;}
.sku{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.comprar{font-weight:700;color:var(--primary);font-family:'DM Mono',monospace;}
.dur-rup{color:var(--red);font-weight:700;}
.empty{background:var(--card);border:1.5px dashed var(--border);border-radius:8px;padding:40px;text-align:center;color:var(--muted);font-weight:600;}
.src{font-size:10px;color:var(--gray);font-family:'DM Mono',monospace;margin-top:18px;}

@media (max-width:760px){.hero-kpis{gap:10px}.kpi{min-width:46%}}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-text">SRV GÁS<sup>®</sup></div>
    <div class="logo-slogan">Conciliação Compras × Caixa</div>
  </div>
  <nav class="header-nav">
    <a class="h-tab" href="HUB.html">HUB</a>
    <a class="h-tab" href="Estoque.html">Estoque</a>
    <a class="h-tab" href="Budget.html">Budget</a>
    <a class="h-tab active" href="Conciliacao.html">Conciliação</a>
  </nav>
  <div class="header-date" id="hdate"></div>
</header>

<section class="hero">
  <div class="hero-inner">
    <span class="hero-tag">Controladoria de Estoque & Compras</span>
    <div class="hero-title">Conciliação <em>Compras × Caixa</em></div>
    <div class="hero-sub" id="sub">cruzamento estoque × contas a pagar (Bling)</div>
    <div class="hero-kpis" id="kpis"></div>
  </div>
</section>

<main class="wrap" id="content"></main>

<script>
const fmtBRL = n => 'R$ ' + (n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK   = n => 'R$ ' + Math.round((n||0)/1000) + 'k';
const MESES  = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const LIMITE_SAUDAVEL = 100000, LIMITE_ATENCAO = 200000;

function urg(d){
  if(d===0)      return {k:'RUPTURA', c:'red'};
  if(d<=15)      return {k:'CRÍTICO', c:'red'};
  if(d<=30)      return {k:'URGENTE', c:'yellow'};
  if(d<=60)      return {k:'ATENÇÃO', c:'yellow'};
  return {k:'PLANEJADO', c:'green'};
}
function parseDataBR(s){const [d,m,y]=(s||'').split('/').map(Number);return (d&&m&&y)?new Date(y,m-1,d):null;}
function nomeMes(k){const [y,m]=k.split('-');return MESES[+m]+'/'+y;}

(function(){
  document.getElementById('hdate').textContent =
    new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}).toUpperCase();

  const est = (window.BASE_ESTOQUE&&window.BASE_ESTOQUE.dados)||[];
  const cax = (window.BASE_CAIXA&&window.BASE_CAIXA.contasAPagar)||[];
  const cont = document.getElementById('content');

  if(!est.length && !cax.length){
    cont.innerHTML = '<div class="empty">Nenhuma base carregada.<br>Rode <b>_estoquista/ATUALIZAR.bat</b> para gerar a base do Bling.</div>';
    return;
  }

  // Plano de compra (projeção 120 dias)
  const itens = est
    .filter(d => (d.proj_compra||0) > 0 && d.estoque_total < d.proj_compra)
    .map(d => { const qtd = Math.ceil(d.proj_compra - d.estoque_total); return {...d, qtd, valor: qtd*(d.custo||0), u: urg(d.duracao)}; })
    .sort((a,b)=>a.duracao-b.duracao);
  const totalUn  = itens.reduce((s,i)=>s+i.qtd,0);
  const totalVal = itens.reduce((s,i)=>s+i.valor,0);
  const semCusto = itens.filter(i=>!i.custo).length;

  // Caixa por mês
  const porMes = {};
  cax.forEach(c=>{ const dt=parseDataBR(c.vencimento); if(!dt)return; const k=dt.getFullYear()+'-'+String(dt.getMonth()).padStart(2,'0'); porMes[k]=(porMes[k]||0)+(c.aPagar||0); });
  const mesesOrd = Object.keys(porMes).sort();
  const totalCaixa = cax.reduce((s,c)=>s+(c.aPagar||0),0);
  let mesPico=null, valPico=0; mesesOrd.forEach(k=>{ if(porMes[k]>valPico){valPico=porMes[k];mesPico=k;} });

  // Agrupar plano
  const grupos={}; itens.forEach(i=>{ (grupos[i.u.k] ||= {c:i.u.c,lista:[]}).lista.push(i); });
  const ordem=['RUPTURA','CRÍTICO','URGENTE','ATENÇÃO','PLANEJADO'];

  const mE=(window.BASE_ESTOQUE&&window.BASE_ESTOQUE.meta)||{}, mC=(window.BASE_CAIXA&&window.BASE_CAIXA.meta)||{};
  document.getElementById('sub').textContent = 'Estoque: '+(mE.data||'—')+'  ·  Caixa: '+(mC.data||'—');

  document.getElementById('kpis').innerHTML =
    `<div class="kpi"><div class="kpi-val">${itens.length}</div><div class="kpi-label">Itens a comprar</div></div>`+
    `<div class="kpi"><div class="kpi-val blue">${fmtK(totalVal)}</div><div class="kpi-label">Plano (120d)</div></div>`+
    `<div class="kpi"><div class="kpi-val red">${fmtK(totalCaixa)}</div><div class="kpi-label">A pagar (aberto)</div></div>`+
    `<div class="kpi"><div class="kpi-val yellow">${mesPico?nomeMes(mesPico):'—'}</div><div class="kpi-label">Mês mais carregado</div></div>`;

  let html = `<div class="sec-title">💰 Compromissos de caixa por mês <span style="color:var(--muted);font-weight:600;font-size:10px">· Bling</span></div>`;
  if(mesesOrd.length){
    html += `<div class="months">`;
    mesesOrd.forEach(k=>{ const v=porMes[k]; const lv=v>=LIMITE_ATENCAO?'lv-red':v>=LIMITE_SAUDAVEL?'lv-yellow':'lv-green';
      html += `<div class="mcard ${lv}"><div class="mn">${nomeMes(k)}</div><div class="mv">${fmtK(v)}</div><div class="ms">${fmtBRL(v)}</div></div>`; });
    html += `</div>`;
  } else html += `<div class="empty">Sem contas a pagar carregadas.</div>`;

  html += `<div class="sec-title">🛒 Plano de compra por urgência <span style="color:var(--muted);font-weight:600;font-size:10px">· projeção 120 dias</span></div>`;
  if(itens.length){
    ordem.forEach(k=>{ const g=grupos[k]; if(!g)return;
      const un=g.lista.reduce((s,i)=>s+i.qtd,0), vl=g.lista.reduce((s,i)=>s+i.valor,0);
      html += `<div class="grp-head"><span class="badge ${g.c}">${k}</span><span class="grp-meta">${g.lista.length} itens · ${un} un · ${fmtK(vl)}</span></div>`;
      html += `<table><thead><tr><th>SKU</th><th>Produto</th><th>Fornecedor</th><th class="c">Estoque</th><th class="c">Nec. 120d</th><th class="c">Comprar</th><th class="r">Custo un</th><th class="r">Valor</th><th class="c">Duração</th></tr></thead><tbody>`;
      g.lista.forEach(i=>{ html += `<tr>
        <td class="sku">${i.sku}</td><td>${i.produto}</td><td>${i.fornecedor}</td>
        <td class="c mono">${i.estoque_total}</td><td class="c mono">${Math.round(i.proj_compra)}</td>
        <td class="c comprar">${i.qtd}</td><td class="r mono">${i.custo?fmtBRL(i.custo):'—'}</td><td class="r mono">${i.valor?fmtBRL(i.valor):'—'}</td>
        <td class="c mono">${i.duracao===0?'<span class="dur-rup">RUPTURA</span>':i.duracao>=9999?'∞':Math.round(i.duracao)+'d'}</td></tr>`; });
      html += `</tbody></table>`;
    });
  } else html += `<div class="empty">Nenhum item abaixo da necessidade de 120 dias. 🎉</div>`;

  html += `<div class="src">Fonte: Bling via Estoquista · histórico ${mE.baseline_dias||60}d · plano = estoque &lt; necessidade p/ ${mE.horizonte_compra_dias||120} dias · valor = quantidade × custo de compra.</div>`;
  cont.innerHTML = html;
})();
</script>
</body>
</html>
